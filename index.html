<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davangere Tourism</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7f7f7;
color:#333;
}

header{
height:100vh;
background:url('https://image.pollinations.ai/prompt/Davangere%20Karnataka%20city%20sunset%20skyline%20modern%20tourism%20banner') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}

header::after{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
padding:20px;
}

.hero-content h1{
font-size:3rem;
margin-bottom:15px;
}

.hero-content p{
max-width:600px;
margin:auto;
margin-bottom:20px;
}

.btn{
background:#ff6b35;
color:white;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
margin-bottom:40px;
}

.section-title h2{
font-size:2rem;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}
